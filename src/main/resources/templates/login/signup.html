<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="../static/css/signup.css">
    <link rel="stylesheet" href="../static/css/modal.css">
</head>

<body>
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <h2>알림</h2>
            <p id="modal-message">알람 내용</p>
            <button class="btn" id="closeModalBtn">닫기</button>
        </div>
    </div>

    <!-- 회원가입 박스 -->
    <div class="login-container">

        <h2>회원가입</h2>
        <div class="underline"></div>
        <form class="signup-form">
            <label for="nickname">닉네임</label>
            <div class="input-wrap">
                <input id="nickname" type="nickname" placeholder="닉넥임은 10자(한글,영문)이하로 작성해주세요">
                <button type="button" class="check-btn nickname-check">중복확인</button>
            </div>
            <p class="msg" id="nicknameMsg"></p>

            <label for="email">이메일</label>
            <div class="input-wrap">
                <input id="email" type="email" placeholder="이메일 형식으로 입력해주세요">
                <button type="button" class="check-btn email-check">중복확인</button>
            </div>
            <p class="msg" id="emailMsg"></p>

            <label for="password">비밀번호</label>
            <input id="password" type="password" placeholder="비밀번호는 8자~16자(영어 소문자,특수문자,숫자 각1개 이상)로 작성해주세요">
            <p class="msg" id="checkMsg"></p>

            <label for="password-check">비밀번호 확인</label>
            <input id="passwordCheck" type="password" placeholder="비밀번호를 한번더 입력하세요.">
            <p class="msg" id="pwMsg"></p>
        </form>
        <div class="btn-wrap">
            <button type="button" class="register-btn">
                <span class="text-expand">가입하기</span>
            </button>
        </div>
    </div>

    <script src="../static/js/signup.js"></script>
    <script src="../static/js/modal.js"></script>
</body>

</html>
